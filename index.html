<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0),
                rgba(255, 255, 255, 0) 50%,
                rgba(0, 0, 0, 0.15) 50%,
                rgba(0, 0, 0, 0.15)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }
        #gameCanvas {
            background-color: #000;
            image-rendering: pixelated;
        }
        #signature {
            margin-top: 10px;
            font-size: 11px;
            color: #444;
            font-family: sans-serif;
            z-index: 20;
            position: relative;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="signature">Created by Stonedhawk (Rahul)</div>
    <script>
        class GameEngineState {
            constructor() {
                this.alienKills = 0;
                this.pendingDrops = 0;
                this.activePowers = [];
                this.wave = 1;
                this.isBossWave = false;
            }
            recordAlienKill() {
                this.alienKills++;
                if (this.alienKills % 8 === 0) {
                    this.pendingDrops++;
                }
            }
            addPowerUp(power) {
                this.activePowers.push(power);
                if (this.activePowers.length > 3) {
                    this.activePowers.shift(); 
                }
            }
            advanceWave() {
                this.wave++;
                if (this.wave >= 10) {
                    this.isBossWave = true;
                }
            }
        }

        const engine = new GameEngineState();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = canvas.width;
        const HEIGHT = canvas.height;

        let gameState = 'START';
        let waveTimer = 0;

        const keys = { left: false, right: false, space: false, pPressed: false };

        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
            if (e.code === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
            if (e.code === 'Space') {
                keys.space = true;
                handleStateTransitions();
            }
            if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
                if (!keys.pPressed) {
                    if (gameState === 'PLAYING') gameState = 'PAUSED';
                    else if (gameState === 'PAUSED') gameState = 'PLAYING';
                    keys.pPressed = true;
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
            if (e.code === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
            if (e.code === 'Space') keys.space = false;
            if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') keys.pPressed = false;
        });

        function handleStateTransitions() {
            if (gameState === 'START' || gameState === 'GAMEOVER' || gameState === 'VICTORY') {
                resetGame();
                gameState = 'PLAYING';
            }
        }

        let score = 0;
        let highScore = parseInt(localStorage.getItem('spaceInvadersHighScore')) || 0;
        let lives = 3;
        let lastTime = 0;

        const stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({ x: Math.random() * WIDTH, y: Math.random() * HEIGHT, speed: Math.random() * 0.5 + 0.1, size: Math.random() * 2 + 1 });
        }

        const player = {
            x: WIDTH / 2 - 15,
            y: HEIGHT - 60,
            width: 30,
            height: 20,
            speed: 5,
            color: '#33ff33',
            bullets: [],
            lastFireTime: 0,
            invincible: false,
            invincibleTimer: 0
        };

        const ufo = {
            active: false,
            x: 0,
            y: 60,
            width: 40,
            height: 18,
            speed: 3,
            direction: 1,
            timer: 0,
            interval: 15000 + Math.random() * 10000,
            color: '#ff3333'
        };

        const boss = {
            active: false,
            x: WIDTH / 2 - 100,
            y: 80,
            width: 200,
            height: 80,
            hp: 2000,
            maxHp: 2000,
            color: '#ff00ff',
            speed: 3,
            direction: 1,
            fireTimer: 0,
            fireInterval: 1000
        };

        const aliens = [];
        const alienRows = 5;
        const alienCols = 8;
        const alienWidth = 30;
        const alienHeight = 24;
        const alienPadding = 20;
        
        let alienDirection = 1;
        let alienBullets = [];
        let alienFireTimer = 0;
        let alienFireInterval = 2000;
        
        function initAliens() {
            aliens.length = 0;
            alienBullets.length = 0;
            alienDirection = 1;
            
            if (engine.isBossWave) {
                boss.active = true;
                boss.hp = boss.maxHp;
                boss.x = WIDTH / 2 - 100;
                boss.y = 80;
                return;
            }

            let baseOffsetTop = 80 + (engine.wave - 1) * 20;
            if (baseOffsetTop > 200) baseOffsetTop = 200; 

            const alienOffsetLeft = 180;
            
            for (let r = 0; r < alienRows; r++) {
                for (let c = 0; c < alienCols; c++) {
                    let type, color, points;
                    if (r === 0) { type = 'small'; color = '#ff3333'; points = 30; }
                    else if (r === 1 || r === 2) { type = 'medium'; color = '#ffaa33'; points = 20; }
                    else { type = 'large'; color = '#33ff99'; points = 10; }
                    
                    aliens.push({
                        x: alienOffsetLeft + c * (alienWidth + alienPadding),
                        y: baseOffsetTop + r * (alienHeight + alienPadding),
                        width: alienWidth,
                        height: alienHeight,
                        type, color, points,
                        active: true
                    });
                }
            }
        }

        const shields = [];
        function initShields() {
            shields.length = 0;
            const shieldMap = [
                '  ...........  ',
                ' ............. ',
                '...............',
                '...............',
                '...............',
                '....... .......',
                '......   ......',
                '.....     .....',
                '....       ....',
                '...         ...'
            ];
            const pSize = 5;
            const tWidth = shieldMap[0].length * pSize;
            const spacing = (WIDTH - (4 * tWidth)) / 5;
            
            for (let i = 0; i < 4; i++) {
                let sx = spacing + i * (tWidth + spacing);
                let sy = HEIGHT - 160;   
                let pixels = [];
                for (let r = 0; r < shieldMap.length; r++) {
                    for (let c = 0; c < shieldMap[r].length; c++) {
                        if (shieldMap[r][c] === '.') {
                            pixels.push({
                                x: sx + c * pSize,
                                y: sy + r * pSize,
                                w: pSize,
                                h: pSize,
                                active: true
                            });
                        }
                    }
                }
                shields.push({ pixels });
            }
        }

        const particles = [];
        function createExplosion(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
                    life: 200, color: color, size: 4
                });
            }
        }
        function createBigExplosion(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10,
                    life: 400, color: color, size: 5
                });
            }
        }
        function createDeathExplosion(x, y, color) {
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15,
                    life: 600, color: color, size: Math.random() * 4 + 2
                });
            }
        }

        const POWERUP_TYPES = [
            { type: 'faster_shooting', color: '#ffcc00', weight: 40 },
            { type: 'bigger_bullets', color: '#00ffff', weight: 40 },
            { type: 'two_bullets', color: '#ff00ff', weight: 12 },
            { type: 'three_bullets', color: '#ff8800', weight: 6 },
            { type: 'laser', color: '#ffffff', weight: 2 }
        ];

        let powerUpCapsules = []; // array of active falling powers

        function getRandomPowerUp() {
            let total = POWERUP_TYPES.reduce((acc, curr) => acc + curr.weight, 0);
            let r = Math.random() * total;
            let sum = 0;
            for (let p of POWERUP_TYPES) {
                sum += p.weight;
                if (r <= sum) return p;
            }
            return POWERUP_TYPES[0];
        }

        function resetGame() {
            score = 0;
            lives = 3;
            engine.wave = 1;
            engine.isBossWave = false;
            engine.alienKills = 0;
            engine.pendingDrops = 0;
            engine.activePowers = [];
            player.x = WIDTH / 2 - 15;
            player.bullets = [];
            player.invincible = false;
            powerUpCapsules = [];
            ufo.active = false;
            ufo.timer = 0;
            boss.active = false;
            initAliens();
            initShields();
            particles.length = 0;
        }

        function updateHighScore() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('spaceInvadersHighScore', highScore);
            }
        }

        function checkShieldCollision(bullet, bIndex, bulletArray) {
            if (bullet.isLaser) return false; 

            for (let s of shields) {
                let minX = s.pixels[0]?.x || 0;
                let maxX = minX + 75;
                if (bullet.x > maxX || bullet.x + bullet.width < minX) continue;

                for (let pIndex = s.pixels.length - 1; pIndex >= 0; pIndex--) {
                    let p = s.pixels[pIndex];
                    if (bullet.x < p.x + p.w && bullet.x + bullet.width > p.x &&
                        bullet.y < p.y + p.h && bullet.y + bullet.height > p.y) {
                        
                        let hitPx = bullet.x + bullet.width/2;
                        let hitPy = bullet.y + bullet.height/2;
                        let radius = bullet.width > 4 ? 15 : 10; 
                        
                        for (let i = s.pixels.length - 1; i >= 0; i--) {
                            let sp = s.pixels[i];
                            let dx = (sp.x + sp.w/2) - hitPx;
                            let dy = (sp.y + sp.h/2) - hitPy;
                            if (dx*dx + dy*dy < radius*radius) {
                                s.pixels.splice(i, 1);
                            }
                        }
                        
                        bulletArray.splice(bIndex, 1);
                        return true;
                    }
                }
            }
            return false;
        }

        function update(dt) {
            let dtFactor = dt / (1000/60);

            for (let star of stars) {
                star.y += star.speed * dtFactor;
                if (star.y > HEIGHT) {
                    star.y = 0;
                    star.x = Math.random() * WIDTH;
                }
            }

            if (gameState === 'START' || gameState === 'GAMEOVER' || gameState === 'PAUSED' || gameState === 'VICTORY') return;

            if (gameState === 'WAVE') {
                waveTimer -= dt;
                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.x += p.vx * dtFactor;
                    p.y += p.vy * dtFactor;
                    p.life -= dt;
                    if (p.life <= 0) particles.splice(i, 1);
                }

                if (waveTimer <= 0) {
                    engine.advanceWave();
                    player.bullets.length = 0;
                    powerUpCapsules.length = 0;
                    initAliens();
                    initShields();
                    gameState = 'PLAYING';
                }
                return;
            }

            if (player.invincible) {
                player.invincibleTimer -= dt;
                if (player.invincibleTimer <= 0) player.invincible = false;
            }

            if (keys.left) player.x -= player.speed * dtFactor;
            if (keys.right) player.x += player.speed * dtFactor;
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > WIDTH) player.x = WIDTH - player.width;

            let currentFireRate = 300;
            let currentBulletWidth = 4;
            let currentNumBullets = 1;
            let currentIsLaser = false;

            for (let p of engine.activePowers) {
                if (p === 'faster_shooting') currentFireRate = Math.max(50, currentFireRate - 120);
                if (p === 'bigger_bullets') currentBulletWidth += 6;
                if (p === 'two_bullets') currentNumBullets = Math.max(currentNumBullets, 2);
                if (p === 'three_bullets') currentNumBullets = 3;
                if (p === 'laser') currentIsLaser = true;
            }

            if (keys.space && lives > 0 && (performance.now() - player.lastFireTime > currentFireRate)) {
                if (currentIsLaser) {
                    player.bullets.push({
                        x: player.x + player.width / 2 - currentBulletWidth/2,
                        y: 0, 
                        width: currentBulletWidth,
                        height: player.y,
                        speed: 0,
                        color: '#ffffff',
                        isLaser: true,
                        life: 150, 
                        hitAliens: new Set()
                    });
                } else {
                    for (let i = 0; i < currentNumBullets; i++) {
                        let offset = 0;
                        if (currentNumBullets === 2) offset = i === 0 ? -12 : 12;
                        if (currentNumBullets === 3) offset = i === 0 ? -16 : (i === 1 ? 0 : 16);
                        
                        player.bullets.push({
                            x: player.x + player.width / 2 - currentBulletWidth/2 + offset,
                            y: player.y,
                            width: currentBulletWidth,
                            height: 15,
                            speed: 10 * dtFactor,
                            color: '#33ff33'
                        });
                    }
                }
                player.lastFireTime = performance.now();
            }

            ufo.timer += dt;
            if (!ufo.active && ufo.timer > ufo.interval && !engine.isBossWave) {
                ufo.active = true;
                ufo.direction = Math.random() > 0.5 ? 1 : -1;
                ufo.x = ufo.direction === 1 ? -ufo.width : WIDTH;
                ufo.timer = 0;
            }
            if (ufo.active) {
                ufo.x += ufo.speed * ufo.direction * dtFactor;
                if ((ufo.direction === 1 && ufo.x > WIDTH) || (ufo.direction === -1 && ufo.x < -ufo.width)) {
                    ufo.active = false;
                    ufo.interval = 15000 + Math.random() * 10000;
                }
            }

            let activeAliens = aliens.filter(a => a.active);

            // Boss Logic
            if (boss.active) {
                boss.x += boss.speed * boss.direction * dtFactor;
                if (boss.direction === 1 && boss.x + boss.width > WIDTH - 20) boss.direction = -1;
                if (boss.direction === -1 && boss.x < 20) boss.direction = 1;
                
                boss.fireTimer += dt;
                if (boss.fireTimer > boss.fireInterval) {
                    boss.fireTimer = 0;
                    for (let i = -2; i <= 2; i++) {
                        alienBullets.push({
                            x: boss.x + boss.width/2 - 2 + i * 20,
                            y: boss.y + boss.height,
                            width: 6, height: 18,
                            speed: 7 * dtFactor,
                            color: '#ff8800'
                        });
                    }
                    boss.fireInterval = 800 + Math.random() * 600; 
                }
            }

            // Update player bullets
            for (let i = player.bullets.length - 1; i >= 0; i--) {
                let b = player.bullets[i];
                if (b.isLaser) {
                    b.life -= dt;
                    if (b.life <= 0) {
                        player.bullets.splice(i, 1);
                        continue;
                    }
                    
                    if (boss.active && !b.hitAliens.has(boss)) {
                        if (b.x < boss.x + boss.width && b.x + b.width > boss.x) {
                            b.hitAliens.add(boss);
                            let damage = 5;
                            boss.hp -= damage;
                            createExplosion(b.x + b.width/2, boss.y + boss.height, boss.color);
                            if (boss.hp <= 0) {
                                boss.active = false;
                                score += 10000;
                                createDeathExplosion(boss.x + boss.width/2, boss.y + boss.height/2, boss.color);
                                updateHighScore();
                                gameState = 'VICTORY';
                            }
                        }
                    }

                    for (let a of activeAliens) {
                        if (!b.hitAliens.has(a) && b.x < a.x + a.width && b.x + b.width > a.x) {
                            b.hitAliens.add(a);
                            
                            a.active = false;
                            score += a.points;
                            engine.recordAlienKill();
                            if (engine.pendingDrops > 0) {
                                engine.pendingDrops--;
                                let pu = getRandomPowerUp();
                                powerUpCapsules.push({
                                    x: a.x + a.width/2 - 10, y: a.y + a.height/2,
                                    width: 20, height: 10, type: pu.type, color: pu.color, speed: 2
                                });
                            }
                            updateHighScore();
                            createExplosion(a.x + a.width/2, a.y + a.height/2, a.color);
                        }
                    }

                    if (ufo.active && !b.hitAliens.has(ufo) && b.x < ufo.x + ufo.width && b.x + b.width > ufo.x) {
                        b.hitAliens.add(ufo);
                        score += 300;
                        updateHighScore();
                        ufo.active = false;
                        createBigExplosion(ufo.x + ufo.width/2, ufo.y + ufo.height/2, ufo.color);
                    }
                } else {
                    b.y -= b.speed;
                    if (b.y < -b.height*2) { 
                        player.bullets.splice(i, 1);
                        continue;
                    }
                    if (checkShieldCollision(b, i, player.bullets)) continue;

                    if (boss.active && b.x < boss.x + boss.width && b.x + b.width > boss.x &&
                        b.y < boss.y + boss.height && b.y + b.height > boss.y) {
                        
                        let damage = currentBulletWidth > 4 ? 30 : 15;
                        boss.hp -= damage;
                        createExplosion(b.x, b.y, boss.color);
                        player.bullets.splice(i, 1);
                        
                        if (boss.hp <= 0) {
                            boss.active = false;
                            score += 10000;
                            createDeathExplosion(boss.x + boss.width/2, boss.y + boss.height/2, boss.color);
                            updateHighScore();
                            gameState = 'VICTORY';
                        }
                        continue;
                    }

                    if (ufo.active && b.x < ufo.x + ufo.width && b.x + b.width > ufo.x &&
                        b.y < ufo.y + ufo.height && b.y + b.height > ufo.y) {
                        
                        let points = [50, 100, 150, 300][Math.floor(Math.random() * 4)];
                        score += points;
                        updateHighScore();
                        ufo.active = false;
                        createBigExplosion(ufo.x + ufo.width/2, ufo.y + ufo.height/2, ufo.color);
                        player.bullets.splice(i, 1);
                        continue;
                    }

                    for (let a of activeAliens) {
                        if (b.x < a.x + a.width && b.x + b.width > a.x &&
                            b.y < a.y + a.height && b.y + b.height > a.y) {
                            
                            a.active = false;
                            score += a.points;
                            engine.recordAlienKill();
                            if (engine.pendingDrops > 0) {
                                engine.pendingDrops--;
                                let pu = getRandomPowerUp();
                                powerUpCapsules.push({
                                    x: a.x + a.width/2 - 10, y: a.y + a.height/2,
                                    width: 20, height: 10, type: pu.type, color: pu.color, speed: 2
                                });
                            }
                            updateHighScore();
                            createExplosion(a.x + a.width/2, a.y + a.height/2, a.color);
                            player.bullets.splice(i, 1); 
                            break;
                        }
                    }
                }
            }

            for (let i = powerUpCapsules.length - 1; i >= 0; i--) {
                let c = powerUpCapsules[i];
                c.y += c.speed * dtFactor;
                if (c.y > HEIGHT) {
                    powerUpCapsules.splice(i, 1);
                    continue;
                }

                if (c.x < player.x + player.width && c.x + c.width > player.x &&
                    c.y < player.y + player.height && c.y + c.height > player.y) {
                    
                    engine.addPowerUp(c.type);
                    score += 50; 
                    powerUpCapsules.splice(i, 1);
                }
            }

            if (!engine.isBossWave) {
                if (activeAliens.length === 0) {
                    gameState = 'WAVE';
                    waveTimer = 2000;
                    ufo.active = false;
                    return;
                }

                let speedFactor = Math.max(0.1, activeAliens.length / (alienRows * alienCols));
                let waveSpeedBonus = (engine.wave - 1) * 0.1;
                let alienSpeedX = (0.5 + (1 - speedFactor) * 2 + waveSpeedBonus) * dtFactor;
                
                let hitEdge = false;
                let hitBottom = false;
                for (let a of activeAliens) {
                    if (a.x + alienSpeedX * alienDirection + a.width > WIDTH - 20 && alienDirection === 1) hitEdge = true;
                    if (a.x + alienSpeedX * alienDirection < 20 && alienDirection === -1) hitEdge = true;
                }

                if (hitEdge) {
                    alienDirection *= -1;
                    for (let a of aliens) {
                        a.y += 20;
                        if (a.y + a.height >= HEIGHT - 160) hitBottom = true; 
                    }
                } else {
                    for (let a of aliens) {
                        a.x += alienSpeedX * alienDirection;
                    }
                }

                if (hitBottom) {
                    lives = 0;
                    createDeathExplosion(player.x + player.width/2, player.y + player.height/2, player.color);
                    gameState = 'GAMEOVER';
                    updateHighScore();
                    return;
                }

                alienFireTimer += dt;
                if (alienFireTimer > alienFireInterval) {
                    alienFireTimer = 0;
                    let numFighters = Math.floor(Math.random() * 3) + 1;
                    for (let i = 0; i < numFighters; i++) {
                        let shooter = activeAliens[Math.floor(Math.random() * activeAliens.length)];
                        alienBullets.push({
                            x: shooter.x + shooter.width / 2 - 2,
                            y: shooter.y + shooter.height,
                            width: 4,
                            height: 15,
                            speed: (5 + engine.wave*0.2) * dtFactor,
                            color: '#ff6666'
                        });
                    }
                    alienFireInterval = Math.max(300, 500 + speedFactor * 2000 - engine.wave * 100);
                }
            }

            for (let i = alienBullets.length - 1; i >= 0; i--) {
                let b = alienBullets[i];
                b.y += b.speed;
                if (b.y > HEIGHT + b.height*2) {
                    alienBullets.splice(i, 1);
                    continue;
                }
                
                if (checkShieldCollision(b, i, alienBullets)) continue;

                if (!player.invincible && lives > 0 &&
                    b.x < player.x + player.width && b.x + b.width > player.x &&
                    b.y < player.y + player.height && b.y + b.height > player.y) {
                    
                    lives--;
                    alienBullets.splice(i, 1);
                    
                    if (lives > 0) {
                        createBigExplosion(player.x + player.width/2, player.y + player.height/2, player.color);
                        player.invincible = true;
                        player.invincibleTimer = 1500;
                    } else {
                        createDeathExplosion(player.x + player.width/2, player.y + player.height/2, player.color);
                        gameState = 'GAMEOVER';
                        updateHighScore();
                    }
                    continue;
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * dtFactor;
                p.y += p.vy * dtFactor;
                p.life -= dt;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawAlien(a) {
            ctx.fillStyle = a.color;
            let x = a.x, y = a.y, w = a.width, h = a.height;
            if (a.type === 'small') {
                ctx.fillRect(x + w/4, y, w/2, h/3);
                ctx.fillRect(x, y + h/3, w, h/3);
                ctx.fillRect(x + w/6, y + 2*h/3, 2*w/3, h/3);
            } else if (a.type === 'medium') {
                ctx.fillRect(x + w/6, y, 2*w/3, h/3);
                ctx.fillRect(x, y + h/3, w, h/3);
                ctx.fillRect(x + w/4, y + 2*h/3, w/2, h/3);
            } else {
                ctx.fillRect(x + w/3, y, w/3, h/3);
                ctx.fillRect(x + w/6, y + h/3, 2*w/3, h/3);
                ctx.fillRect(x, y + 2*h/3, w, h/3);
            }
            ctx.fillStyle = '#000';
            ctx.fillRect(x + w/3, y + h/3, 4, 4);
            ctx.fillRect(x + 2*w/3 - 4, y + h/3, 4, 4);
        }

        function drawBoss() {
            ctx.fillStyle = boss.color;
            let x = boss.x, y = boss.y, w = boss.width, h = boss.height;
            ctx.fillRect(x + w/4, y, w/2, h/4);
            ctx.fillRect(x + w/8, y + h/4, 3*w/4, h/4);
            ctx.fillRect(x, y + 2*h/4, w, h/4);
            ctx.fillRect(x + w/4, y + 3*h/4, w/2, h/4);

            ctx.fillStyle = Math.floor(performance.now() / 150) % 2 === 0 ? '#ffea00' : '#ff0000';
            ctx.fillRect(x + w/4 + 10, y + 3*h/4, 20, h/4);
            ctx.fillRect(x + 3*w/4 - 30, y + 3*h/4, 20, h/4);

            // HB Bar
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(WIDTH/2 - 200, 20, 400, 10);
            ctx.fillStyle = '#33ff33';
            let hpW = (boss.hp / boss.maxHp) * 400;
            if (hpW < 0) hpW = 0;
            ctx.fillRect(WIDTH/2 - 200, 20, hpW, 10);
        }

        function drawUFO() {
            ctx.fillStyle = ufo.color;
            if (Math.floor(performance.now() / 150) % 2 === 0) {
                ctx.fillStyle = '#ff6666'; 
            }
            let x = ufo.x, y = ufo.y, w = ufo.width, h = ufo.height;
            ctx.fillRect(x + w/4, y, w/2, h/3);
            ctx.fillRect(x + w/8, y + h/3, 3*w/4, h/3);
            ctx.fillRect(x, y + 2*h/3, w, h/3);
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            ctx.fillStyle = '#fff';
            for (let star of stars) {
                ctx.fillRect(star.x, star.y, star.size, star.size);
            }

            if (gameState === 'START') {
                ctx.font = '40px "Press Start 2P"';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.fillText('SPACE INVADERS', WIDTH / 2, HEIGHT / 3);

                ctx.font = '16px "Press Start 2P"';
                ctx.fillStyle = '#ff3333';
                ctx.fillText('SMALL ALIEN = 30 PTS', WIDTH / 2, HEIGHT / 2);
                ctx.fillStyle = '#ffaa33';
                ctx.fillText('MEDIUM ALIEN = 20 PTS', WIDTH / 2, HEIGHT / 2 + 40);
                ctx.fillStyle = '#33ff99';
                ctx.fillText('LARGE ALIEN = 10 PTS', WIDTH / 2, HEIGHT / 2 + 80);
                
                ctx.fillStyle = '#ff00ff';
                ctx.fillText('GRAB FALLING POWERS!', WIDTH / 2, HEIGHT / 2 + 130);
                
                ctx.fillStyle = '#00ffff';
                ctx.fillText('WAVE 10 = BOSS', WIDTH / 2, HEIGHT / 2 + 170);

                if (Math.floor(performance.now() / 500) % 2 === 0) {
                    ctx.fillStyle = '#fff';
                    ctx.fillText('PRESS SPACE TO START', WIDTH / 2, HEIGHT - 80);
                }
                return;
            }

            ctx.fillStyle = '#33ff33';
            for (let s of shields) {
                for (let p of s.pixels) {
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                }
            }

            if (ufo.active) drawUFO();

            if (boss.active) drawBoss();

            for (let c of powerUpCapsules) {
                ctx.fillStyle = c.color;
                ctx.fillRect(c.x, c.y, c.width, c.height);
                ctx.fillStyle = '#000';
                ctx.font = '8px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText('P', c.x + c.width/2, c.y + 8);
            }

            if (lives > 0 && (!player.invincible || Math.floor(performance.now() / 150) % 2 === 0)) {
                ctx.fillStyle = player.color;
                ctx.fillRect(player.x, player.y + 10, player.width, player.height - 10);
                ctx.fillRect(player.x + 10, player.y, 10, 10);
                ctx.fillRect(player.x + 13, player.y - 5, 4, 5);
            }

            for (let b of player.bullets) {
                if (b.isLaser) {
                    ctx.fillStyle = b.color;
                    ctx.fillRect(b.x, b.y, b.width, b.height);
                    if (Math.floor(performance.now() / 50) % 2 === 0) {
                        ctx.fillStyle = 'rgba(255,255,255,0.5)';
                        ctx.fillRect(b.x - 2, b.y, b.width + 4, b.height);
                    }
                } else {
                    let grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.height * 2);
                    grad.addColorStop(0, '#33ff33');
                    grad.addColorStop(1, 'rgba(51, 255, 51, 0)');
                    ctx.fillStyle = grad;
                    ctx.fillRect(b.x, b.y, b.width, b.height * 2);
                }
            }
            for (let b of alienBullets) {
                let grad = ctx.createLinearGradient(b.x, b.y + b.height, b.x, b.y - b.height);
                grad.addColorStop(0, '#ff6666');
                grad.addColorStop(1, 'rgba(255, 102, 102, 0)');
                ctx.fillStyle = grad;
                ctx.fillRect(b.x, b.y - b.height, b.width, b.height * 2);
            }

            for (let a of aliens) {
                if (a.active) drawAlien(a);
            }

            for (let p of particles) {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }

            ctx.font = '16px "Press Start 2P"';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 20, 30);
            ctx.textAlign = 'center';
            if (!boss.active) {
                ctx.fillText(`HI-SCORE: ${highScore}`, WIDTH / 2, 30);
            }
            
            for (let i = 0; i < lives; i++) {
                ctx.fillStyle = '#33ff33';
                const lx = WIDTH - 40 - (i * 35);
                const ly = 15;
                ctx.fillRect(lx, ly + 5, 20, 10);
                ctx.fillRect(lx + 6, ly, 8, 5);
                ctx.fillRect(lx + 8, ly - 3, 4, 3);
            }

            ctx.font = '10px "Press Start 2P"';
            ctx.fillStyle = '#aaa';
            ctx.textAlign = 'left';
            ctx.fillText(`POWERS:`, 20, HEIGHT - 20);
            for (let i = 0; i < engine.activePowers.length; i++) {
                let type = engine.activePowers[i];
                let color = POWERUP_TYPES.find(p => p.type === type)?.color || '#fff';
                ctx.fillStyle = color;
                ctx.fillRect(100 + i * 25, HEIGHT - 28, 20, 10);
                
                if (i === engine.activePowers.length - 1) {
                    ctx.strokeStyle = '#fff';
                    ctx.strokeRect(100 + i * 25 - 1, HEIGHT - 28 - 1, 22, 12);
                }
            }

            if (gameState === 'WAVE') {
                if (Math.floor(performance.now() / 150) % 2 === 0) {
                    ctx.font = '40px "Press Start 2P"';
                    ctx.fillStyle = '#fff';
                    ctx.textAlign = 'center';
                    if (engine.isBossWave) {
                        ctx.fillStyle = '#ff00ff';
                        ctx.fillText(`WARNING: BOSS`, WIDTH / 2, HEIGHT / 2);
                    } else {
                        ctx.fillText(`WAVE ${engine.wave}`, WIDTH / 2, HEIGHT / 2);
                    }
                }
            }

            if (gameState === 'VICTORY') {
                ctx.font = '40px "Press Start 2P"';
                ctx.fillStyle = '#ffea00';
                ctx.textAlign = 'center';
                ctx.fillText('YOU WIN!', WIDTH / 2, HEIGHT / 2 - 20);
                ctx.font = '20px "Press Start 2P"';
                ctx.fillText('THE GALAXY IS SAVED.', WIDTH / 2, HEIGHT / 2 + 30);
                
                if (Math.floor(performance.now() / 500) % 2 === 0) {
                    ctx.font = '16px "Press Start 2P"';
                    ctx.fillStyle = '#fff';
                    ctx.fillText('PRESS SPACE TO RESTART', WIDTH / 2, HEIGHT / 2 + 80);
                }
            }

            if (gameState === 'GAMEOVER') {
                ctx.font = '40px "Press Start 2P"';
                ctx.fillStyle = '#ff3333';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', WIDTH / 2, HEIGHT / 2);
                if (Math.floor(performance.now() / 500) % 2 === 0) {
                    ctx.font = '16px "Press Start 2P"';
                    ctx.fillStyle = '#fff';
                    ctx.fillText('PRESS SPACE TO PLAY AGAIN', WIDTH / 2, HEIGHT / 2 + 50);
                }
            }

            if (gameState === 'PAUSED') {
                ctx.font = '40px "Press Start 2P"';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', WIDTH / 2, HEIGHT / 2);
            }
        }

        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let dt = timestamp - lastTime;
            lastTime = timestamp;
            if (dt > 100) dt = 100;
            
            update(dt);
            draw();
            requestAnimationFrame(gameLoop);
        }

        document.fonts.ready.then(() => {
            requestAnimationFrame(gameLoop);
        });
    </script>
</body>
</html>
